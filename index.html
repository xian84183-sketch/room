<!DOCTYPE html>

  <title>A-Frame VR Room</title>

  <!-- ===== 手机端 VR 回退：WebXR Polyfill =====
       iOS Safari 完全没有 WebXR，部分安卓浏览器也不提供 immersive-vr，
       因此 A-Frame 检测不到头显就会隐藏“进入 VR”按钮。
       这个 polyfill 会补出 navigator.xr 并提供 Cardboard 式分屏立体 VR，
       A-Frame 随即会重新显示 VR 按钮，手机上即可进入 VR 模式。
       注意：必须在 aframe.min.js 之前加载并实例化。 -->
  <script src="https://cdn.jsdelivr.net/npm/webxr-polyfill@2.0.3/build/webxr-polyfill.min.js"></script>
  <script>
    if (window.WebXRPolyfill) {
      window.__webxrPolyfill = new WebXRPolyfill({ cardboard: true });
    }
  </script>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="12A.js"></script>
  <link rel="stylesheet" href="style.css" />

  <script>
    /* ── pickup-manager 注册可拾取物体 ──
       在场景加载完成后调用 window.PickupManager.register()
       第一个参数是 Blender 里的节点名，第二个参数是可选配置。

       示例（把 apple 注册为可拾取）：
       window.PickupManager.register("apple");

       带配置示例：
       window.PickupManager.register("apple", {
         fuseDur:      2000,   // 凝视拾起时长(ms)
         carryDist:    0.5,    // 持物距相机距离(m)
         carryOffsetY: -0.1    // 垂直偏移(m)
       });

       注意：节点名必须与 GLB 中的节点名完全一致。
       可同时注册多个物体，每次只能持一个。
    ── */
    document.querySelector("a-scene").addEventListener("loaded", function () {
      // 在此处添加你想拾取的物体节点名
      // window.PickupManager.register("apple");
      // window.PickupManager.register("kettle");
    });
  </script>
  <script>
    /* ── AudioContext 解锁 ──
       浏览器要求 AudioContext 必须在用户手势后才能发声。
       监听页面任意一次点击/触摸，提前创建并 resume ctx，
       之后凝视触发响铃时就已经可以正常播放了。 */
    function _unlockAudio() {
      if (window._sharedAudioCtx) return;
      try {
        window._sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        window._sharedAudioCtx.resume();
        console.log("[alarm] AudioContext 已解锁");
      } catch(e) {}
      document.removeEventListener("click",      _unlockAudio);
      document.removeEventListener("touchstart", _unlockAudio);
    }
    document.addEventListener("click",      _unlockAudio, { once: true });
    document.addEventListener("touchstart", _unlockAudio, { once: true });
  </script>

  <style>
    /* 共用定位基础 */
    #bread-hint,
    #oven-baking-wrap {
      position: fixed;
      bottom: clamp(40px, 8vh, 80px);
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.5s ease;
      max-width: 92vw;
    }
    #bread-hint.visible,
    #oven-baking-wrap.visible { opacity: 1; }

    /* 面包提示 */
    #bread-hint-inner {
      display: flex;
      align-items: center;
      gap: clamp(6px, 2vw, 12px);
      background: rgba(0,0,0,0.62);
      border: 1px solid rgba(255,220,100,0.55);
      border-radius: 32px;
      padding: clamp(8px,2vh,14px) clamp(14px,4vw,28px);
      backdrop-filter: blur(6px);
      box-shadow: 0 0 18px rgba(255,200,60,0.25);
    }
    #bread-hint-icon {
      font-size: clamp(16px,4vw,24px);
      animation: breadBounce 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    #bread-hint-text {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: clamp(11px,3vw,16px);
      color: #ffe680;
      letter-spacing: 0.02em;
      white-space: normal;
      word-break: break-word;
      line-height: 1.4;
    }
    @keyframes breadBounce {
      0%,100% { transform: translateY(0);    }
      50%      { transform: translateY(-4px); }
    }

    /* 进度条 */
    #oven-baking-wrap {
      display: flex;
      align-items: center;
      gap: clamp(8px,2.5vw,14px);
      background: rgba(0,0,0,0.62);
      border: 1px solid rgba(255,160,60,0.5);
      border-radius: 32px;
      padding: clamp(8px,2vh,13px) clamp(14px,4vw,28px);
      backdrop-filter: blur(6px);
      box-shadow: 0 0 18px rgba(255,130,30,0.2);
    }
    .oven-baking-label {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: clamp(11px,3vw,16px);
      color: #ffaa44;
      flex-shrink: 0;
    }
    #oven-baking-track {
      width: clamp(100px,30vw,200px);
      height: clamp(7px,1.5vw,11px);
      background: rgba(255,255,255,0.12);
      border-radius: 6px;
      overflow: hidden;
    }
    #oven-baking-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg,#ff7700,#ffdd00);
      border-radius: 6px;
    }
  </style>

  <script>
    /* 面包提示控制器 */
    window.BreadHint = {
      _el: null, _timer: null,
      _get: function () {
        if (!this._el) this._el = document.getElementById("bread-hint");
        return this._el;
      },
      show: function () {
        clearTimeout(this._timer);
        var el = this._get(); if (el) el.classList.add("visible");
      },
      hide: function () {
        var self = this;
        this._timer = setTimeout(function () {
          var el = self._get(); if (el) el.classList.remove("visible");
        }, 300);
      }
    };

    /* 烘烤进度条控制器 */
    window.OvenHint = (function () {
      var _wrap = null, _fill = null, _raf = null;
      var BAKE_DUR = 5000;
      function _init() {
        if (_wrap) return;
        _wrap = document.getElementById("oven-baking-wrap");
        _fill = document.getElementById("oven-baking-fill");
      }
      return {
        showBaking: function () {
          _init();
          _fill.style.width = "0%";
          _wrap.classList.add("visible");
          var start = null;
          cancelAnimationFrame(_raf);
          function step(ts) {
            if (!start) start = ts;
            var pct = Math.min((ts - start) / BAKE_DUR * 100, 100);
            _fill.style.width = pct + "%";
            if (pct < 100) {
              _raf = requestAnimationFrame(step);
            } else {
              setTimeout(function () {
                _wrap.classList.remove("visible");
                setTimeout(function () { _fill.style.width = "0%"; }, 500);
              }, 600);
            }
          }
          _raf = requestAnimationFrame(step);
        }
      };
    })();
  </script>
